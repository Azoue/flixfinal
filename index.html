<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="FlixTN - السينما العربية والتونسية والعالمية"/>
  <title>FlixTN</title>
  <style>body{margin:0;background:#060610}</style>
</head>
<body>
  <div id="root"></div>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <script type="text/babel">
// React and Supabase loaded via CDN
const { useState, useEffect, useRef, useCallback } = React;
const { createClient } = supabase;

/* ═══════════════════════════════════════════════════════════════
   FlixTN PRODUCTION — متصل بـ Supabase (قاعدة بيانات حقيقية)
   ضع مفاتيح Supabase الخاصة بك هنا
═══════════════════════════════════════════════════════════════ */
const SUPABASE_URL  = "https://ytqvktojlzuzipxhlbfb.supabase.co";   // ← غيّر هذا
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0cXZrdG9qbHp1emlweGhsYmZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5OTg2NDcsImV4cCI6MjA4ODU3NDY0N30._W3cXXHPFxuryU2xqAaWPcsVFWZUIgcEAzF4TeEdp5c"; // ← غيّر هذا
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

/* ─── CSS ────────────────────────────────────────────────────── */
const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Oswald:wght@400;600;700&family=Tajawal:wght@300;400;500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060610;--bg1:#0c0c1a;--bg2:#111122;--bg3:#181830;
  --s1:#1e1e38;--s2:#252545;--s3:#2e2e55;
  --red:#e50914;--red2:#ff2d3a;--red3:#ff6b6b;
  --gold:#f5c518;--cyan:#00d4ff;--green:#1db954;
  --t1:#f0f0ff;--t2:#9898bb;--t3:#55557a;--t4:#33334f;
  --r:10px;--tr:0.25s cubic-bezier(.4,0,.2,1);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t1);font-family:'Cairo',sans-serif;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg1)}::-webkit-scrollbar-thumb{background:var(--red);border-radius:3px}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.85rem 2rem;transition:background .4s,box-shadow .4s}
.nav.top{background:linear-gradient(to bottom,rgba(6,6,16,.9),transparent)}
.nav.scrolled{background:rgba(6,6,16,.97);backdrop-filter:blur(20px);box-shadow:0 1px 0 rgba(255,255,255,.05)}
.nav-logo{font-family:'Oswald',sans-serif;font-size:1.6rem;font-weight:700;cursor:pointer;letter-spacing:-1px}
.nav-links{display:flex;gap:1.5rem;align-items:center}
.nav-lnk{font-size:.85rem;cursor:pointer;color:var(--t2);transition:color var(--tr);padding:.3rem 0;border-bottom:2px solid transparent}
.nav-lnk:hover,.nav-lnk.active{color:var(--t1);border-bottom-color:var(--red)}
.nav-right{display:flex;align-items:center;gap:.7rem}
.nav-icon-btn{background:none;border:none;color:var(--t1);font-size:1.1rem;cursor:pointer;padding:.4rem;border-radius:6px;transition:background var(--tr)}
.nav-icon-btn:hover{background:var(--s2)}
.nav-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;cursor:pointer;border:2px solid var(--s3);transition:border-color var(--tr)}
.nav-avatar:hover{border-color:var(--red)}
.nav-avatar-wrap{position:relative;z-index:101}
.u-menu{position:absolute;left:0;top:calc(100% + .6rem);background:var(--bg2);border:1px solid var(--s3);border-radius:var(--r);width:220px;overflow:hidden;box-shadow:0 16px 50px rgba(0,0,0,.85);z-index:500}
.u-menu-item{display:flex;align-items:center;gap:.65rem;padding:.75rem 1rem;font-size:.8rem;cursor:pointer;transition:background var(--tr);color:var(--t1);width:100%}
.u-menu-item:hover{background:var(--s2)}
.u-menu-div{height:1px;background:var(--s2);margin:.3rem 0}
.btn-signin{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:var(--t1);padding:.4rem .9rem;border-radius:6px;cursor:pointer;font-size:.8rem;font-family:'Cairo',sans-serif;transition:background var(--tr)}
.btn-signin:hover{background:rgba(255,255,255,.18)}
.btn-join{background:var(--red);border:none;color:#fff;padding:.4rem .9rem;border-radius:6px;cursor:pointer;font-size:.8rem;font-family:'Cairo',sans-serif;font-weight:700;transition:background var(--tr)}
.btn-join:hover{background:var(--red2)}

/* HERO */
.hero{position:relative;height:100vh;min-height:600px;display:flex;align-items:flex-end;overflow:hidden}
.hero-bg{position:absolute;inset:0}
.hero-bg img{width:100%;height:100%;object-fit:cover;animation:ken 20s ease infinite alternate}
@keyframes ken{0%{transform:scale(1)}100%{transform:scale(1.08)}}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(6,6,16,.6) 40%,rgba(6,6,16,.2) 70%,transparent 100%)}
.hero-content{position:relative;z-index:2;padding:3rem 2rem;max-width:700px;width:100%}
.hero-title{font-family:'Oswald',sans-serif;font-size:clamp(2rem,6vw,4rem);font-weight:700;line-height:1.1;margin-bottom:.7rem;text-shadow:0 2px 20px rgba(0,0,0,.5)}
.hero-meta{display:flex;gap:.8rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem;font-size:.82rem}
.hero-desc{color:var(--t2);font-size:.95rem;line-height:1.7;max-width:560px;margin-bottom:1.5rem;font-family:'Tajawal',sans-serif}
.hero-btns{display:flex;gap:.8rem;flex-wrap:wrap}
.btn-play{background:var(--red);border:none;color:#fff;padding:.8rem 2rem;border-radius:8px;cursor:pointer;font-size:.88rem;font-family:'Cairo',sans-serif;font-weight:700;display:flex;align-items:center;gap:.5rem;transition:all .25s;white-space:nowrap}
.btn-play:hover{background:var(--red2);transform:translateY(-2px);box-shadow:0 8px 25px rgba(229,9,20,.4)}
.btn-info{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:var(--t1);padding:.8rem 1.8rem;border-radius:8px;cursor:pointer;font-size:.88rem;font-family:'Cairo',sans-serif;font-weight:600;backdrop-filter:blur(10px);transition:all .25s}
.btn-info:hover{background:rgba(255,255,255,.2)}

/* SECTIONS */
.section{padding:1rem 0 2rem}
.section-hd{display:flex;align-items:center;justify-content:space-between;padding:.5rem 2rem 1rem;flex-wrap:wrap;gap:.5rem}
.section-hd-left{display:flex;align-items:center;gap:.6rem}
.section-bar{width:4px;height:22px;background:var(--red);border-radius:2px}
.section-title{font-family:'Oswald',sans-serif;font-size:1.15rem;font-weight:600;letter-spacing:.5px}
.section-link{font-size:.75rem;color:var(--t3);cursor:pointer;transition:color var(--tr)}
.section-link:hover{color:var(--t1)}

/* CARDS SLIDER */
.slider-wrap{position:relative}
.slider{display:flex;gap:1rem;overflow-x:auto;padding:.5rem 2rem 1.2rem;scroll-snap-type:x mandatory;-ms-overflow-style:none;scrollbar-width:none}
.slider::-webkit-scrollbar{display:none}

/* MOVIE CARD */
.card{flex-shrink:0;width:160px;cursor:pointer;position:relative;scroll-snap-align:start;transition:transform .28s,box-shadow .28s}
.card:hover{transform:translateY(-6px) scale(1.04);z-index:2}
.card:hover .card-img{box-shadow:0 12px 40px rgba(229,9,20,.4)}
.card-img{width:160px;height:240px;object-fit:cover;border-radius:var(--r);background:var(--s2);display:block;transition:box-shadow .28s}
.card-overlay{position:absolute;inset:0;border-radius:var(--r);background:linear-gradient(to top,rgba(6,6,16,.95) 0%,transparent 55%);opacity:0;transition:opacity .25s}
.card:hover .card-overlay{opacity:1}
.card-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);width:42px;height:42px;border-radius:50%;background:rgba(229,9,20,.9);display:flex;align-items:center;justify-content:center;opacity:0;transition:all .25s;font-size:1rem}
.card:hover .card-play{opacity:1;transform:translate(-50%,-50%) scale(1)}
.card-info{position:absolute;bottom:0;left:0;right:0;padding:.6rem;opacity:0;transition:opacity .25s}
.card:hover .card-info{opacity:1}
.card-title{font-size:.72rem;font-weight:700;font-family:'Cairo',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.2rem}
.card-meta{font-size:.62rem;color:var(--t3);display:flex;gap:.4rem}
.card-badge{position:absolute;top:.5rem;right:.5rem;background:var(--red);color:#fff;font-size:.58rem;font-weight:700;padding:.15rem .4rem;border-radius:4px;font-family:'Oswald',sans-serif}

/* TOP 10 CARD */
.rank-card{flex-shrink:0;width:180px;cursor:pointer;position:relative;display:flex;align-items:flex-end;scroll-snap-align:start}
.rank-num{font-family:'Oswald',sans-serif;font-size:7rem;font-weight:900;line-height:1;color:transparent;-webkit-text-stroke:3px var(--s3);margin-left:-15px;flex-shrink:0;transition:color .25s,-webkit-text-stroke .25s}
.rank-card:hover .rank-num{-webkit-text-stroke-color:var(--red)}
.rank-img{width:130px;height:195px;object-fit:cover;border-radius:var(--r);background:var(--s2);flex-shrink:0;transition:box-shadow .25s}
.rank-card:hover .rank-img{box-shadow:0 10px 35px rgba(229,9,20,.4)}

/* WIDE CARD */
.wide-card{flex-shrink:0;width:260px;cursor:pointer;position:relative;scroll-snap-align:start;transition:transform .28s}
.wide-card:hover{transform:translateY(-4px)}
.wide-img{width:260px;height:146px;object-fit:cover;border-radius:var(--r);background:var(--s2);display:block}
.wide-title{font-size:.78rem;font-weight:700;font-family:'Cairo',sans-serif;padding:.5rem .3rem .1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wide-meta{font-size:.65rem;color:var(--t3);padding:0 .3rem}

/* GRID */
.c-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem;padding:0 2rem}

/* DETAIL */
.detail-hero{position:relative;height:60vh;min-height:400px;display:flex;align-items:flex-end;overflow:hidden}
.detail-hero-bg{position:absolute;inset:0}
.detail-hero-bg img{width:100%;height:100%;object-fit:cover}
.detail-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(6,6,16,.5) 50%,transparent 100%)}
.detail-content{position:relative;z-index:2;padding:2rem}
.detail-title{font-family:'Oswald',sans-serif;font-size:clamp(1.5rem,4vw,2.8rem);font-weight:700;line-height:1.1;margin-bottom:.6rem}
.detail-body{display:grid;grid-template-columns:1fr 280px;gap:2rem;padding:2rem;max-width:1400px;margin:0 auto}
@media(max-width:900px){.detail-body{grid-template-columns:1fr}}
.detail-desc{color:var(--t2);font-size:.9rem;line-height:1.8;margin-bottom:1.5rem;font-family:'Tajawal',sans-serif}
.info-row{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1.5rem}
.info-tag{background:var(--s2);border:1px solid var(--s3);border-radius:6px;padding:.3rem .7rem;font-size:.72rem;color:var(--t2)}
.cast-row{display:flex;gap:.8rem;flex-wrap:wrap}
.cast-item{display:flex;flex-direction:column;align-items:center;gap:.3rem;width:60px}
.cast-img{width:50px;height:50px;border-radius:50%;object-fit:cover;background:var(--s2);border:2px solid var(--s3)}
.cast-name{font-size:.6rem;text-align:center;color:var(--t2);line-height:1.2}
.sidebar-widget{background:var(--bg2);border:1px solid var(--s2);border-radius:var(--r);padding:1.2rem;margin-bottom:1rem}
.sidebar-title{font-family:'Oswald',sans-serif;font-size:.85rem;font-weight:600;letter-spacing:.5px;margin-bottom:.9rem;color:var(--t2)}
.act-btn{display:block;width:100%;padding:.75rem;background:var(--s2);border:1px solid var(--s3);border-radius:8px;color:var(--t1);cursor:pointer;font-family:'Cairo',sans-serif;font-size:.8rem;text-align:center;margin-bottom:.5rem;transition:all .25s}
.act-btn:hover{background:var(--s3);border-color:var(--red)}
.act-btn.fav-on{background:rgba(229,9,20,.15);border-color:rgba(229,9,20,.4);color:var(--red3)}
.genre-pill{background:rgba(229,9,20,.12);border:1px solid rgba(229,9,20,.25);color:var(--red3);padding:.2rem .55rem;border-radius:20px;font-size:.65rem;font-weight:600}

/* SEASONS & EPISODES */
.season-nav{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.2rem}
.season-btn{padding:.45rem 1rem;background:var(--s2);border:1px solid var(--s3);border-radius:6px;color:var(--t2);cursor:pointer;font-size:.76rem;font-family:'Cairo',sans-serif;transition:all .25s}
.season-btn:hover,.season-btn.active{background:var(--red);border-color:var(--red);color:#fff}
.ep-card{display:flex;align-items:center;gap:1rem;padding:.9rem;background:var(--bg2);border:1px solid var(--s2);border-radius:var(--r);cursor:pointer;margin-bottom:.6rem;transition:all .25s}
.ep-card:hover{background:var(--s1);border-color:var(--s3);transform:translateX(-4px)}
.ep-num{font-family:'Oswald',sans-serif;font-size:1.4rem;font-weight:700;color:var(--t4);width:28px;flex-shrink:0;text-align:center}
.ep-thumb{width:120px;height:68px;object-fit:cover;border-radius:6px;background:var(--s2);flex-shrink:0}
.ep-info{flex:1;min-width:0}
.ep-title{font-weight:700;font-size:.85rem;font-family:'Cairo',sans-serif;margin-bottom:.2rem}
.ep-desc{font-size:.72rem;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.2rem}
.ep-dur{font-size:.68rem;color:var(--t4)}
.ep-play{color:var(--red);font-size:1.1rem;flex-shrink:0}

/* PLAYER */
.player-page{background:#000;min-height:100vh;padding-top:0}
.player-nav{display:flex;align-items:center;gap:1rem;padding:.8rem 1.5rem;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);position:sticky;top:0;z-index:10}
.player-back-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:var(--t1);padding:.45rem .9rem;border-radius:6px;cursor:pointer;font-size:.8rem;font-family:'Cairo',sans-serif;transition:background .25s;white-space:nowrap}
.player-back-btn:hover{background:rgba(255,255,255,.2)}
.player-video-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;overflow:hidden;max-height:80vh}
.player-video-wrap iframe,.player-video-wrap video{position:absolute;inset:0;width:100%;height:100%;border:none}
.player-info{padding:1.5rem 2rem;max-width:900px}

/* SEARCH */
.search-modal{position:fixed;inset:0;z-index:1000;background:rgba(6,6,16,.97);backdrop-filter:blur(20px);overflow-y:auto;padding:5rem 1rem 2rem}
.search-wrap{max-width:860px;margin:0 auto}
.search-input-box{display:flex;align-items:center;gap:.8rem;background:var(--bg2);border:1px solid var(--s3);border-radius:12px;padding:.7rem 1rem;margin-bottom:1.5rem}
.search-in{background:none;border:none;color:var(--t1);font-size:1rem;font-family:'Cairo',sans-serif;flex:1;outline:none}
.search-in-icon{font-size:1.1rem;color:var(--t3)}
.search-in-close{background:var(--s2);border:none;color:var(--t2);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center}
.search-label{font-size:.72rem;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:.8rem}
.search-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1rem}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;overflow:hidden}
.auth-backdrop{position:fixed;inset:0;background:linear-gradient(135deg,#060610 0%,#0c0420 50%,#060610 100%);z-index:-1}
.auth-box{background:rgba(17,17,34,.95);border:1px solid var(--s3);border-radius:16px;padding:2.5rem;width:100%;max-width:420px;backdrop-filter:blur(20px)}
.auth-logo-big{font-family:'Oswald',sans-serif;font-size:2rem;font-weight:700;text-align:center;margin-bottom:.3rem}
.auth-tagline{text-align:center;font-size:.75rem;color:var(--t3);margin-bottom:1.5rem}
.auth-title{font-size:1.1rem;font-weight:700;margin-bottom:1.3rem;text-align:center}
.fg{margin-bottom:1rem}
.fl{display:block;font-size:.72rem;color:var(--t3);margin-bottom:.4rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.fi{width:100%;background:var(--bg3);border:1px solid var(--s3);border-radius:8px;padding:.75rem 1rem;color:var(--t1);font-family:'Cairo',sans-serif;font-size:.88rem;outline:none;transition:border-color .25s;direction:ltr}
.fi:focus{border-color:var(--red)}
.fsel{width:100%;background:var(--bg3);border:1px solid var(--s3);border-radius:8px;padding:.75rem 1rem;color:var(--t1);font-family:'Cairo',sans-serif;font-size:.88rem;outline:none;cursor:pointer}
.ftarea{width:100%;background:var(--bg3);border:1px solid var(--s3);border-radius:8px;padding:.75rem 1rem;color:var(--t1);font-family:'Cairo',sans-serif;font-size:.88rem;outline:none;min-height:90px;resize:vertical;transition:border-color .25s}
.ftarea:focus{border-color:var(--red)}
.fe{background:rgba(229,9,20,.1);border:1px solid rgba(229,9,20,.3);border-radius:8px;padding:.6rem .9rem;font-size:.78rem;color:var(--red3);margin-bottom:.8rem}
.auth-btn{width:100%;background:var(--red);border:none;color:#fff;padding:.9rem;border-radius:8px;cursor:pointer;font-size:.92rem;font-family:'Cairo',sans-serif;font-weight:700;transition:background .25s;margin-top:.5rem}
.auth-btn:hover{background:var(--red2)}
.auth-btn:disabled{background:var(--s2);color:var(--t3);cursor:not-allowed}
.auth-hint{text-align:center;font-size:.68rem;color:var(--t4);margin-top:.8rem}
.auth-note{text-align:center;font-size:.78rem;color:var(--t3);margin-top:1rem}
.auth-note span{color:var(--red3);cursor:pointer;font-weight:700}

/* PROFILE */
.profile-pg{padding:5rem 2rem 3rem;max-width:1200px;margin:0 auto}
.profile-banner{display:flex;align-items:center;gap:1.5rem;padding:1.5rem;background:var(--bg2);border:1px solid var(--s2);border-radius:14px;margin-bottom:2rem;flex-wrap:wrap}
.p-avatar{width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid var(--red);flex-shrink:0}
.p-name{font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:600}
.p-email{font-size:.75rem;color:var(--t3);margin:.2rem 0}
.p-badge{display:inline-flex;align-items:center;gap:.3rem;background:rgba(229,9,20,.12);border:1px solid rgba(229,9,20,.25);color:var(--red3);padding:.2rem .6rem;border-radius:20px;font-size:.68rem;font-weight:700}

/* ADMIN */
.admin-pg{padding:5rem 2rem 3rem;max-width:1400px;margin:0 auto}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem}
.admin-logo{font-family:'Oswald',sans-serif;font-size:1.5rem;font-weight:700}
.admin-badge{background:rgba(229,9,20,.15);border:1px solid rgba(229,9,20,.3);color:var(--red3);padding:.3rem .9rem;border-radius:20px;font-size:.75rem;font-weight:700}
.admin-tabs{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem;border-bottom:1px solid var(--s2);padding-bottom:1rem}
.a-tab{padding:.55rem 1.2rem;background:transparent;border:1px solid var(--s2);border-radius:8px;color:var(--t3);cursor:pointer;font-size:.78rem;font-family:'Cairo',sans-serif;transition:all .25s}
.a-tab:hover{color:var(--t1);border-color:var(--s3)}
.a-tab.active{background:var(--red);border-color:var(--red);color:#fff;font-weight:700}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem}
.stat-box{background:var(--bg2);border:1px solid var(--s2);border-radius:var(--r);padding:1.2rem;text-align:center}
.stat-val{font-family:'Oswald',sans-serif;font-size:2rem;font-weight:700;color:var(--red3)}
.stat-lbl{font-size:.72rem;color:var(--t3);margin-top:.3rem}
.a-table{width:100%;border-collapse:collapse;font-size:.78rem}
.a-table th{text-align:right;padding:.7rem .9rem;color:var(--t3);font-weight:600;font-size:.68rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--s2)}
.a-table td{padding:.7rem .9rem;border-bottom:1px solid var(--s1);vertical-align:middle}

/* ─── HELPERS ─────────────────────────────────────────────── */
function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return <div className="toast" onClick={onClose}>{msg}</div>;
}

function getEmbedUrl(url) {
  if (!url) return null;
  if (url.includes("/embed/") || url.includes("player.vimeo") || url.includes("dailymotion.com/embed")) return url;
  const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if (yt) return `https://www.youtube.com/embed/${yt[1]}?autoplay=1&rel=0`;
  const dm = url.match(/dailymotion\.com\/video\/([a-zA-Z0-9]+)/);
  if (dm) return `https://www.dailymotion.com/embed/video/${dm[1]}?autoplay=1`;
  const vi = url.match(/vimeo\.com\/(\d+)/);
  if (vi) return `https://player.vimeo.com/video/${vi[1]}?autoplay=1`;
  return url;
}
const isDirect = url => url && (url.endsWith(".mp4") || url.endsWith(".webm") || url.includes(".mp4?"));

/* ─── SUPABASE HOOKS ─────────────────────────────────────── */
function useContent() {
  const [movies, setMovies] = useState([]);
  const [series, setSeries] = useState([]);
  const [loading, setLoading] = useState(true);

  const fetchAll = useCallback(async () => {
    setLoading(true);
    const { data: content } = await sb.from("content").select(`
      *, seasons(*, episodes(*))
    `).order("created_at", { ascending: false });

    if (content) {
      setMovies(content.filter(c => c.type === "movie").map(m => ({ ...m, type: "movie" })));
      setSeries(content.filter(c => c.type === "series").map(s => ({ ...s, type: "series" })));
    }
    setLoading(false);
  }, []);

  useEffect(() => { fetchAll(); }, [fetchAll]);
  return { movies, series, loading, refetch: fetchAll };
}

/* ─── MOVIE CARD ─────────────────────────────────────────── */
function MovieCard({ item, onClick, showType }) {
  return (
    <div className="card" onClick={() => onClick(item)}>
      <img className="card-img" src={item.poster} alt={item.title}
        loading="lazy" onError={e => e.target.src = "https://picsum.photos/seed/" + item.id + "/160/240"} />
      <div className="card-overlay" />
      <div className="card-play">▶</div>
      <div className="card-info">
        <div className="card-title">{item.title}</div>
        <div className="card-meta">
          <span style={{ color: "#f5c518" }}>★{item.rating}</span>
          <span>{item.year}</span>
          {showType && <span style={{ color: item.type === "movie" ? "#e50914" : "#00d4ff" }}>{item.type === "movie" ? "فيلم" : "مسلسل"}</span>}
        </div>
      </div>
      {item.trending && <div className="card-badge">🔥 رائج</div>}
    </div>
  );
}

/* ─── HOME PAGE ──────────────────────────────────────────── */
function HomePage({ movies, series, onItemClick, onPlay, user, favorites, history }) {
  const all = [...movies, ...series];
  const featured = all.filter(x => x.featured);
  const hero = featured[0] || all[0];
  const trending = all.filter(x => x.trending);
  const top10 = [...all].sort((a, b) => b.rating - a.rating).slice(0, 10);
  const arabicM = movies.filter(m => m.cat === "arabic");
  const tunisianM = movies.filter(m => m.cat === "tunisian");
  const intlM = movies.filter(m => m.cat === "international");
  const arabicS = series.filter(s => s.cat === "arabic");
  const histItems = history.slice(0, 8).map(h => all.find(x => x.id === h.content_id)).filter(Boolean);
  const favItems = favorites.slice(0, 8).map(f => all.find(x => x.id === f.content_id)).filter(Boolean);

  if (!hero) return null;

  const Slider = ({ title, items, wide, ranked }) => items.length === 0 ? null : (
    <div className="section">
      <div className="section-hd">
        <div className="section-hd-left"><div className="section-bar" /><span className="section-title">{title}</span></div>
      </div>
      <div className="slider">
        {items.map((item, i) => ranked ? (
          <div key={item.id} className="rank-card" onClick={() => onItemClick(item)}>
            <span className="rank-num">{i + 1}</span>
            <img className="rank-img" src={item.poster} alt={item.title}
              onError={e => e.target.src = "https://picsum.photos/seed/" + item.id + "/130/195"} />
          </div>
        ) : wide ? (
          <div key={item.id} className="wide-card" onClick={() => onItemClick(item)}>
            <img className="wide-img" src={item.backdrop || item.poster} alt={item.title}
              onError={e => e.target.src = "https://picsum.photos/seed/" + item.id + "/260/146"} />
            <div className="wide-title">{item.title}</div>
            <div className="wide-meta">★{item.rating} · {item.year}</div>
          </div>
        ) : (
          <MovieCard key={item.id} item={item} onClick={onItemClick} />
        ))}
      </div>
    </div>
  );

  return (
    <div>
      {/* HERO */}
      <div className="hero">
        <div className="hero-bg"><img src={hero.backdrop || hero.poster} alt={hero.title} /></div>
        <div className="hero-overlay" />
        <div className="hero-content">
          <div style={{ display: "flex", gap: ".5rem", marginBottom: ".7rem", flexWrap: "wrap" }}>
            {hero.genre?.map(g => <span key={g} className="genre-pill">{g}</span>)}
          </div>
          <h1 className="hero-title">{hero.title}</h1>
          <div className="hero-meta">
            <span style={{ color: "#f5c518", fontWeight: 700 }}>★ {hero.rating}</span>
            <span style={{ color: "var(--t3)" }}>{hero.year}</span>
            {hero.duration && <span style={{ color: "var(--t3)" }}>⏱ {hero.duration}</span>}
            <span style={{ color: "var(--green)", fontWeight: 700 }}>{hero.match_pct}% مطابق</span>
          </div>
          <p className="hero-desc">{hero.description?.slice(0, 140)}...</p>
          <div className="hero-btns">
            <button className="btn-play" onClick={() => onPlay(hero)}>▶ شاهد الآن</button>
            <button className="btn-info" onClick={() => onItemClick(hero)}>ℹ التفاصيل</button>
          </div>
        </div>
      </div>

      {histItems.length > 0 && <Slider title="أكمل المشاهدة" items={histItems} wide />}
      <Slider title="🔥 الرائج الآن" items={trending} wide />
      <Slider title="🏆 أفضل 10 اليوم" items={top10} ranked />
      <Slider title="🎬 آخر الأفلام" items={movies.slice(0, 12)} />
      <Slider title="📺 المسلسلات الشعبية" items={series.slice(0, 12)} />
      <Slider title="🇸🇦 أفلام عربية" items={arabicM} />
      <Slider title="🇹🇳 أفلام تونسية" items={tunisianM} />
      <Slider title="🌍 أفلام عالمية" items={intlM} />
      <Slider title="📺 مسلسلات عربية" items={arabicS} />
      {favItems.length > 0 && <Slider title="❤ مفضلتك" items={favItems} />}
    </div>
  );
}

function PlayerPage({ item, episode, onBack }) {
  const [err, setErr] = useState(false);
  const rawUrl = episode ? episode.video_url : item?.video_url;
  const embedUrl = getEmbedUrl(rawUrl);
  const title = episode ? `${item?.title} — ${episode.title}` : item?.title;
  return (
    <div className="player-page">
      <div className="player-nav">
        <button className="player-back-btn" onClick={onBack}>← رجوع</button>
        <span style={{ fontSize: ".85rem", fontWeight: 700, fontFamily: "'Cairo',sans-serif", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{title}</span>
      </div>
      <div className="player-video-wrap">
        {!rawUrl && (
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100%", color: "var(--t3)", gap: "1rem", background: "#000", aspectRatio: "16/9" }}>

            <div style={{ fontSize: ".9rem" }}>لا يوجد رابط فيديو لهذا المحتوى</div>

          <video controls autoPlay style={{ width: "100%", height: "100%", background: "#000" }}>
            <source src={rawUrl} type="video/mp4" />
          </video>
        )}
        {rawUrl && !isDirect(rawUrl) && embedUrl && !err && (
          <iframe key={embedUrl} src={embedUrl} title={title} allowFullScreen
            allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
            referrerPolicy="no-referrer-when-downgrade"
            style={{ position: "absolute", inset: 0, width: "100%", height: "100%", border: "none" }}
            onError={() => setErr(true)} />
        )}
        {rawUrl && err && (
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100%", color: "var(--t3)", gap: "1rem", background: "#000", aspectRatio: "16/9", padding: "2rem", textAlign: "center" }}>
            <div style={{ fontSize: "2.5rem", opacity: .4 }}>⚠️</div>
            <div>تعذّر تحميل الفيديو</div>
            <a href={rawUrl} target="_blank" rel="noreferrer" style={{ padding: ".6rem 1.3rem", background: "var(--red)", color: "#fff", borderRadius: "8px", textDecoration: "none", fontSize: ".82rem", fontFamily: "'Cairo',sans-serif" }}>فتح في تبويب جديد</a>

        <div style={{ display: "flex", gap: ".6rem", flexWrap: "wrap", marginBottom: ".8rem", alignItems: "center" }}>
          {item?.genre?.map(g => <span key={g} className="genre-pill">{g}</span>)}

          <span style={{ color: "#f5c518", fontWeight: 700, fontSize: ".8rem" }}>★ {item?.rating}</span>
          {rawUrl && <a href={rawUrl} target="_blank" rel="noreferrer" style={{ color: "var(--cyan)", fontSize: ".72rem", marginRight: "auto" }}>🔗 الرابط الأصلي</a>}
        </div>
        <h2 style={{ fontFamily: "'Oswald',sans-serif", fontSize: "1.3rem", fontWeight: 600, marginBottom: ".6rem" }}>{title}</h2>
        <p style={{ color: "var(--t2)", fontSize: ".85rem", lineHeight: "1.75", fontFamily: "'Tajawal',sans-serif" }}>{episode?.description || item?.description}</p>
      </div>
    </div>

        </div>
        {q.length > 1 ? (
          <>
            <div className="search-label">{res.length} نتيجة لـ "{q}"</div>
            {res.length > 0
              ? <div className="search-grid">{res.map(item => <MovieCard key={item.id} item={item} onClick={i => { onItemClick(i); onClose(); }} showType />)}</div>

          </>
        )}
      </div>
    </div>
  );
}

/* ─── AUTH ───────────────────────────────────────────────── */
function AuthPage({ mode, onAuth, onSwitch }) {
  const [f, setF] = useState({ name: "", email: "", password: "" });
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);
  const isLogin = mode === "login";

  const submit = async () => {
    setErr(""); setLoading(true);
    if (!f.email || !f.password) { setErr("يرجى ملء جميع الحقول"); setLoading(false); return; }
    try {
      if (isLogin) {
        const { data, error } = await sb.auth.signInWithPassword({ email: f.email, password: f.password });
        if (error) { setErr("البريد الإلكتروني أو كلمة المرور غير صحيحة"); }
        else { onAuth(data.user); }
      } else {
        if (!f.name) { setErr("يرجى إدخال اسمك"); setLoading(false); return; }
        const { data, error } = await sb.auth.signUp({ email: f.email, password: f.password, options: { data: { username: f.name } } });
        if (error) { setErr(error.message); }
        else if (data.user) { onAuth(data.user); }
        else { setErr("يرجى تأكيد بريدك الإلكتروني ثم تسجيل الدخول"); }
      }
    } catch (e) { setErr("حدث خطأ، حاول مرة أخرى"); }
    setLoading(false);
  };

  return (
    <div className="auth-wrap">
      <div className="auth-backdrop" />
      <div className="auth-box">
        <div className="auth-logo-big"><span style={{ color: "#fff" }}>FLIX</span><span style={{ color: "var(--red)" }}>TN</span></div>
        <div className="auth-tagline">السينما العربية والتونسية والعالمية في مكان واحد</div>
        <h2 className="auth-title">{isLogin ? "تسجيل الدخول" : "إنشاء حساب جديد"}</h2>
        {!isLogin && <div className="fg"><label className="fl">الاسم الكامل</label><input className="fi" value={f.name} onChange={e => setF({ ...f, name: e.target.value })} placeholder="اسمك الكامل" style={{ direction: "rtl" }} /></div>}
        <div className="fg"><label className="fl">البريد الإلكتروني</label><input className="fi" type="email" value={f.email} onChange={e => setF({ ...f, email: e.target.value })} placeholder="email@example.com" /></div>
        <div className="fg"><label className="fl">كلمة المرور</label><input className="fi" type="password" value={f.password} onChange={e => setF({ ...f, password: e.target.value })} placeholder="••••••••" onKeyDown={e => e.key === "Enter" && submit()} /></div>
        {err && <div className="fe">⚠ {err}</div>}
        <button className="auth-btn" onClick={submit} disabled={loading}>{loading ? "جاري التحميل..." : isLogin ? "دخول" : "إنشاء الحساب"}</button>
        <div className="auth-note">{isLogin ? "ليس لديك حساب؟ " : "لديك حساب بالفعل؟ "}<span onClick={onSwitch}>{isLogin ? "سجل الآن" : "تسجيل الدخول"}</span></div>
      </div>
    </div>
  );
}

/* ─── ADD CONTENT FORM ───────────────────────────────────── */
function AddContentForm({ onSuccess }) {
  const [type, setType] = useState("movie");
  const [f, setF] = useState({ title: "", sub: "", year: "2024", rating: "8.0", genre: "", cat: "arabic", poster: "", backdrop: "", description: "", cast_list: "", duration: "", video_url: "", featured: false, trending: false });
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");

  const submit = async () => {
    if (!f.title) { setErr("العنوان مطلوب"); return; }
    setLoading(true);
    const { error } = await sb.from("content").insert({
      type,
      title: f.title, sub: f.sub, year: parseInt(f.year) || 2024,
      rating: parseFloat(f.rating) || 7.0,
      genre: f.genre.split(/[,،]/).map(x => x.trim()).filter(Boolean),
      cat: f.cat,
      poster: f.poster || `https://picsum.photos/seed/${Date.now()}/300/450`,
      backdrop: f.backdrop || `https://picsum.photos/seed/${Date.now()}b/1280/720`,
      description: f.description,
      cast_list: f.cast_list.split(/[,،]/).map(x => x.trim()).filter(Boolean),
      duration: f.duration, video_url: f.video_url,
      featured: f.featured, trending: f.trending, match_pct: 90
    });
    setLoading(false);
    if (error) { setErr(error.message); } else { onSuccess(); }
  };

  const inp = (k, v) => setF(p => ({ ...p, [k]: v }));
  return (
    <div className="add-form">
      <div style={{ marginBottom: "1rem" }}>
        <label className="fl">نوع المحتوى</label>
        <div style={{ display: "flex", gap: ".5rem" }}>

        <div className="fg"><label className="fl">العنوان الفرعي</label><input className="fi" value={f.sub} onChange={e => inp("sub", e.target.value)} placeholder="Sub title" /></div>

        <div className="fg"><label className="fl">طاقم التمثيل (بفاصلة)</label><input className="fi" value={f.cast_list} onChange={e => inp("cast_list", e.target.value)} placeholder="ممثل 1، ممثل 2" style={{ direction: "rtl" }} /></div>
        {type === "movie" && <div className="fg" style={{ gridColumn: "1/-1" }}><label className="fl">رابط الفيديو</label><input className="fi" value={f.video_url} onChange={e => inp("video_url", e.target.value)} placeholder="https://www.youtube.com/watch?v=..." /></div>}
        <div className="fg"><label className="fl">رابط البوستر</label><input className="fi" value={f.poster} onChange={e => inp("poster", e.target.value)} placeholder="https://..." /></div>
        <div className="fg"><label className="fl">رابط الخلفية</label><input className="fi" value={f.backdrop} onChange={e => inp("backdrop", e.target.value)} placeholder="https://..." /></div>
        <div className="fg" style={{ gridColumn: "1/-1" }}><label className="fl">الوصف</label><textarea className="ftarea" value={f.description} onChange={e => inp("description", e.target.value)} placeholder="وصف الفيلم/المسلسل..." style={{ direction: "rtl" }} /></div>

            <input type="checkbox" checked={f.featured} onChange={e => inp("featured", e.target.checked)} style={{ accentColor: "var(--red)" }} /> مميز في الرئيسية
          </label>
          <label style={{ display: "flex", alignItems: "center", gap: ".4rem", cursor: "pointer", fontSize: ".8rem", color: "var(--t2)" }}>
            <input type="checkbox" checked={f.trending} onChange={e => inp("trending", e.target.checked)} style={{ accentColor: "var(--red)" }} /> رائج
          </label>
        </div>

      {err && <div className="fe" style={{ marginTop: ".5rem" }}>⚠ {err}</div>}
      <button className="btn-play" style={{ marginTop: ".8rem", fontSize: ".82rem", padding: ".7rem 1.6rem" }} onClick={submit} disabled={loading}>

      </button>
    </div>
  );
}

/* ─── EDIT CONTENT MODAL ─────────────────────────────────── */
function EditContentModal({ item, onClose, showToast }) {
  const isNew = item._new;
  const isSeasons = item._manageSeasons;
  const [f, setF] = useState({
    title: item.title || "", sub: item.sub || "", year: item.year || 2024,
    rating: item.rating || 7.0, genre: Array.isArray(item.genre) ? item.genre.join("، ") : "",
    cat: item.cat || "arabic", poster: item.poster || "", backdrop: item.backdrop || "",
    description: item.description || "",
    cast_list: Array.isArray(item.cast_list) ? item.cast_list.join("، ") : "",
    duration: item.duration || "", video_url: item.video_url || "",
    featured: item.featured || false, trending: item.trending || false
  });
  const [saving, setSaving] = useState(false);
  // Seasons state
  const [seasons, setSeasons] = useState(item.seasons || []);
  const [selSeason, setSelSeason] = useState(0);
  const [newSeasonTitle, setNewSeasonTitle] = useState("");
  const [epForm, setEpForm] = useState({ title: "", description: "", duration: "", thumb_url: "", video_url: "" });
  const [addingEp, setAddingEp] = useState(false);
  const inp = (k, v) => setF(p => ({ ...p, [k]: v }));

  const save = async () => {
    setSaving(true);
    const data = {
      title: f.title, sub: f.sub, year: parseInt(f.year), rating: parseFloat(f.rating),
      genre: f.genre.split(/[,،]/).map(x => x.trim()).filter(Boolean),
      cat: f.cat, poster: f.poster, backdrop: f.backdrop, description: f.description,
      cast_list: f.cast_list.split(/[,،]/).map(x => x.trim()).filter(Boolean),
      duration: f.duration, video_url: f.video_url, featured: f.featured, trending: f.trending
    };
    if (isNew) {
      await sb.from("content").insert({ ...data, type: item.type, match_pct: 90 });
      showToast("✓ تمت الإضافة");
    } else {
      await sb.from("content").update(data).eq("id", item.id);
      showToast("✓ تم الحفظ");
    }
    setSaving(false); onClose();
  };

  const addSeason = async () => {
    if (!newSeasonTitle) return;
    const { data } = await sb.from("seasons").insert({ content_id: item.id, title: newSeasonTitle, season_num: seasons.length + 1 }).select().single();
    if (data) { setSeasons(p => [...p, { ...data, episodes: [] }]); setNewSeasonTitle(""); showToast("✓ تم إضافة الموسم"); }
  };
  const delSeason = async (sid) => {
    await sb.from("seasons").delete().eq("id", sid);
    setSeasons(p => p.filter(s => s.id !== sid));
    showToast("تم حذف الموسم");
  };
  const addEp = async () => {
    if (!epForm.title || seasons.length === 0) return;
    const sid = seasons[selSeason].id;
    const epCount = seasons[selSeason].episodes?.length || 0;
    const { data } = await sb.from("episodes").insert({ ...epForm, season_id: sid, content_id: item.id, ep_num: epCount + 1 }).select().single();
    if (data) {
      setSeasons(p => p.map((s, i) => i === selSeason ? { ...s, episodes: [...(s.episodes || []), data] } : s));
      setEpForm({ title: "", description: "", duration: "", thumb_url: "", video_url: "" });
      setAddingEp(false); showToast("✓ تمت إضافة الحلقة");
    }
  };
  const delEp = async (epId) => {
    await sb.from("episodes").delete().eq("id", epId);
    setSeasons(p => p.map((s, i) => i === selSeason ? { ...s, episodes: s.episodes.filter(e => e.id !== epId) } : s));
    showToast("تم حذف الحلقة");
  };

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 2000, background: "rgba(0,0,0,.8)", backdropFilter: "blur(8px)", display: "flex", alignItems: "flex-start", justifyContent: "center", padding: "4rem 1rem 2rem", overflowY: "auto" }} onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background: "var(--bg2)", border: "1px solid var(--s3)", borderRadius: "14px", width: "100%", maxWidth: "700px", padding: "1.5rem" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "1.3rem" }}>
          <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: "1rem", fontWeight: 600 }}>
            {isSeasons ? `📺 مواسم: ${item.title}` : isNew ? `➕ إضافة ${item.type === "movie" ? "فيلم" : "مسلسل"}` : `✏ تعديل: ${item.title}`}
          </div>
          <button onClick={onClose} style={{ background: "var(--s2)", border: "none", color: "var(--t2)", width: "30px", height: "30px", borderRadius: "50%", cursor: "pointer", fontSize: "1rem" }}>✕</button>
        </div>

        {!isSeasons ? (
          <div>
            <div className="form-grid-2">
              <div className="fg"><label className="fl">العنوان *</label><input className="fi" value={f.title} onChange={e => inp("title", e.target.value)} style={{ direction: "rtl" }} /></div>
              <div className="fg"><label className="fl">العنوان الفرعي</label><input className="fi" value={f.sub} onChange={e => inp("sub", e.target.value)} /></div>
              <div className="fg"><label className="fl">السنة</label><input className="fi" value={f.year} onChange={e => inp("year", e.target.value)} /></div>
              <div className="fg"><label className="fl">التقييم</label><input className="fi" value={f.rating} onChange={e => inp("rating", e.target.value)} /></div>
              <div className="fg"><label className="fl">التصنيف</label>
                <select className="fsel" value={f.cat} onChange={e => inp("cat", e.target.value)}>
                  <option value="arabic">🇸🇦 عربي</option><option value="tunisian">🇹🇳 تونسي</option><option value="international">🌍 عالمي</option>
                </select>
              </div>
              <div className="fg"><label className="fl">المدة</label><input className="fi" value={f.duration} onChange={e => inp("duration", e.target.value)} /></div>
              <div className="fg"><label className="fl">الأنواع</label><input className="fi" value={f.genre} onChange={e => inp("genre", e.target.value)} style={{ direction: "rtl" }} /></div>
              <div className="fg"><label className="fl">طاقم التمثيل</label><input className="fi" value={f.cast_list} onChange={e => inp("cast_list", e.target.value)} style={{ direction: "rtl" }} /></div>
              {item.type !== "series" && <div className="fg" style={{ gridColumn: "1/-1" }}><label className="fl">رابط الفيديو</label><input className="fi" value={f.video_url} onChange={e => inp("video_url", e.target.value)} placeholder="https://youtube.com/watch?v=..." /></div>}
              <div className="fg"><label className="fl">رابط البوستر</label><input className="fi" value={f.poster} onChange={e => inp("poster", e.target.value)} /></div>
              <div className="fg"><label className="fl">رابط الخلفية</label><input className="fi" value={f.backdrop} onChange={e => inp("backdrop", e.target.value)} /></div>
              <div className="fg" style={{ gridColumn: "1/-1" }}><label className="fl">الوصف</label><textarea className="ftarea" value={f.description} onChange={e => inp("description", e.target.value)} style={{ direction: "rtl" }} /></div>
              <div className="fg" style={{ display: "flex", gap: "1.5rem" }}>
                <label style={{ display: "flex", alignItems: "center", gap: ".4rem", cursor: "pointer", fontSize: ".8rem", color: "var(--t2)" }}><input type="checkbox" checked={f.featured} onChange={e => inp("featured", e.target.checked)} style={{ accentColor: "var(--red)" }} /> مميز</label>
                <label style={{ display: "flex", alignItems: "center", gap: ".4rem", cursor: "pointer", fontSize: ".8rem", color: "var(--t2)" }}><input type="checkbox" checked={f.trending} onChange={e => inp("trending", e.target.checked)} style={{ accentColor: "var(--red)" }} /> رائج</label>
              </div>
            </div>
            <div style={{ display: "flex", gap: ".7rem", marginTop: "1rem" }}>
              <button onClick={save} disabled={saving} className="btn-play" style={{ fontSize: ".82rem", padding: ".65rem 1.5rem" }}>{saving ? "جاري الحفظ..." : "💾 حفظ"}</button>
              <button onClick={onClose} style={{ padding: ".65rem 1.1rem", background: "var(--s2)", border: "1px solid var(--s3)", borderRadius: "8px", color: "var(--t2)", cursor: "pointer", fontFamily: "'Cairo',sans-serif", fontSize: ".82rem" }}>إلغاء</button>
            </div>
          </div>
        ) : (
          /* SEASONS MANAGER */
          <div>
            <div style={{ display: "flex", gap: ".6rem", marginBottom: ".8rem" }}>
              <input className="fi" style={{ flex: 1 }} value={newSeasonTitle} onChange={e => setNewSeasonTitle(e.target.value)} placeholder="اسم الموسم (مثال: الموسم 1)" style={{ direction: "rtl" }} />
              <button onClick={addSeason} className="btn-play" style={{ fontSize: ".8rem", padding: ".6rem 1.2rem", whiteSpace: "nowrap" }}>+ موسم</button>
            </div>
            {seasons.length === 0 && <div style={{ padding: "1.5rem", textAlign: "center", color: "var(--t4)", fontSize: ".82rem", background: "var(--bg3)", borderRadius: "8px", border: "1px dashed var(--s3)" }}>لا يوجد مواسم — أضف موسماً أولاً</div>}
            {seasons.length > 0 && (
              <>
                <div style={{ display: "flex", gap: ".5rem", flexWrap: "wrap", marginBottom: "1rem" }}>
                  {seasons.map((s, i) => (
                    <div key={s.id} style={{ display: "flex", alignItems: "center", gap: ".2rem" }}>
                      <button className={`season-btn${selSeason === i ? " active" : ""}`} onClick={() => setSelSeason(i)}>{s.title} ({s.episodes?.length || 0})</button>
                      <button onClick={() => delSeason(s.id)} style={{ background: "none", border: "none", color: "var(--t4)", cursor: "pointer", fontSize: ".8rem" }}>🗑</button>
                    </div>
                  ))}
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: ".7rem" }}>
                  <div style={{ fontSize: ".78rem", color: "var(--t2)" }}>{seasons[selSeason]?.title}</div>
                  <button onClick={() => setAddingEp(true)} style={{ padding: ".35rem .8rem", background: "rgba(29,185,84,.15)", border: "1px solid rgba(29,185,84,.3)", borderRadius: "6px", color: "var(--green)", cursor: "pointer", fontSize: ".72rem", fontFamily: "'Cairo',sans-serif" }}>+ حلقة جديدة</button>
                </div>
                {addingEp && (
                  <div style={{ background: "var(--bg3)", border: "1px solid var(--s3)", borderRadius: "8px", padding: "1rem", marginBottom: "1rem" }}>
                    <div className="form-grid-2">
                      <div className="fg"><label className="fl">عنوان الحلقة *</label><input className="fi" value={epForm.title} onChange={e => setEpForm(p => ({ ...p, title: e.target.value }))} style={{ direction: "rtl" }} /></div>
                      <div className="fg"><label className="fl">المدة</label><input className="fi" value={epForm.duration} onChange={e => setEpForm(p => ({ ...p, duration: e.target.value }))} placeholder="45د" /></div>

                      <div className="fg"><label className="fl">رابط الصورة المصغرة</label><input className="fi" value={epForm.thumb_url} onChange={e => setEpForm(p => ({ ...p, thumb_url: e.target.value }))} /></div>

                    <div style={{ display: "flex", gap: ".6rem", marginTop: ".5rem" }}>
                      <button onClick={addEp} className="btn-play" style={{ fontSize: ".8rem", padding: ".55rem 1.2rem" }}>💾 إضافة</button>

                    </div>
                  </div>
                )}
                {(seasons[selSeason]?.episodes || []).map((ep, i) => (
                  <div key={ep.id} style={{ display: "flex", alignItems: "center", gap: ".8rem", padding: ".7rem .9rem", background: "var(--bg3)", border: "1px solid var(--s2)", borderRadius: "8px", marginBottom: ".5rem" }}>

/* ─── MAIN APP ───────────────────────────────────────────── */
function App() {
  const [page, setPage] = useState("home");
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);
  const [authMode, setAuthMode] = useState("login");
  const [selectedItem, setSelectedItem] = useState(null);
  const [playerItem, setPlayerItem] = useState(null);
  const [playerEp, setPlayerEp] = useState(null);
  const [searchOpen, setSearchOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  const [showUserMenu, setShowUserMenu] = useState(false);
  const [favorites, setFavorites] = useState([]);
  const [history, setHistory] = useState([]);
  const [toast, setToast] = useState("");
  const { movies, series, loading, refetch } = useContent();

  // Auth listener
  useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) { setUser(session.user); loadProfile(session.user.id); }
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_e, session) => {
      if (session?.user) { setUser(session.user); loadProfile(session.user.id); }
      else { setUser(null); setProfile(null); setFavorites([]); setHistory([]); }
    });
    return () => subscription.unsubscribe();
  }, []);

  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 60);
    window.addEventListener("scroll", fn);
    return () => window.removeEventListener("scroll", fn);
  }, []);

  const loadProfile = async (uid) => {
    const { data } = await sb.from("profiles").select("*").eq("id", uid).single();
    if (data) setProfile(data);
    // Load favorites and history
    const [{ data: favs }, { data: hist }] = await Promise.all([
      sb.from("favorites").select("*").eq("user_id", uid),
      sb.from("watch_history").select("*").eq("user_id", uid).order("watched_at", { ascending: false })
    ]);
    if (favs) setFavorites(favs);
    if (hist) setHistory(hist);
  };

  const showToast = useCallback(m => { setToast(m); setTimeout(() => setToast(""), 3000); }, []);

  const handleAuth = (u) => { setUser(u); loadProfile(u.id); setPage("home"); showToast(`مرحباً! 🎬`); };
  const handleLogout = async () => {
    await sb.auth.signOut();
    setUser(null); setProfile(null); setFavorites([]); setHistory([]);
    setPage("home"); setShowUserMenu(false); showToast("تم تسجيل الخروج");
  };

  const handleItemClick = (item) => { setSelectedItem(item); setPage("detail"); window.scrollTo(0, 0); };
  const handlePlay = async (item) => {
    if (user) {
      await sb.from("watch_history").upsert({ user_id: user.id, content_id: item.id, watched_at: new Date().toISOString() });
      loadProfile(user.id);
    }
    setPlayerItem(item); setPlayerEp(null); setPage("player"); window.scrollTo(0, 0);
  };
  const handleSelectEp = async (s, ep) => {
    if (user) {
      await sb.from("watch_history").upsert({ user_id: user.id, content_id: s.id, episode_id: ep.id, watched_at: new Date().toISOString() });
      loadProfile(user.id);
    }
    setPlayerItem(s); setPlayerEp(ep); setPage("player"); window.scrollTo(0, 0);
  };
  const handleToggleFav = async (item) => {
    if (!user) { showToast("يرجى تسجيل الدخول"); return; }
    const exists = favorites.find(f => f.content_id === item.id);
    if (exists) {
      await sb.from("favorites").delete().eq("id", exists.id);
      setFavorites(p => p.filter(f => f.content_id !== item.id));
      showToast("تمت الإزالة من المفضلة");
    } else {
      const { data } = await sb.from("favorites").insert({ user_id: user.id, content_id: item.id }).select().single();
      if (data) setFavorites(p => [...p, data]);
      showToast("❤ تمت الإضافة إلى المفضلة");
    }
  };
  const goBack = () => { if (page === "player") { setPage(selectedItem ? "detail" : "home"); return; } setPage("home"); window.scrollTo(0, 0); };

  const isAdmin = profile?.is_admin;
  const showNav = page !== "auth" && page !== "player";
  const showFooter = !["auth", "player"].includes(page);

  if (loading) return (
    <div className="loading-screen">
      <style>{CSS}</style>
      <div className="loading-logo"><span style={{ color: "#fff" }}>FLIX</span><span style={{ color: "#e50914" }}>TN</span></div>
      <div className="spinner" />
    </div>
  );

  return (
    <div style={{ direction: "rtl" }}>
      <style>{CSS}</style>

      {showNav && (
        <nav className={`nav${scrolled ? " scrolled" : " top"}`}>
          <div style={{ display: "flex", alignItems: "center", gap: "2rem" }}>
            <div className="nav-logo" onClick={() => { setPage("home"); window.scrollTo(0, 0); }}>
              <span style={{ color: "#fff" }}>FLIX</span><span style={{ color: "#e50914" }}>TN</span>
            </div>
            <div className="nav-links">
              {[["home", "الرئيسية"], ["movies", "الأفلام"], ["series", "المسلسلات"]].map(([k, l]) => (
                <div key={k} className={`nav-lnk${page === k ? " active" : ""}`} onClick={() => { setPage(k); window.scrollTo(0, 0); }}>{l}</div>
              ))}
              {isAdmin && <div className={`nav-lnk${page === "admin" ? " active" : ""}`} onClick={() => setPage("admin")}>⚙ الإدارة</div>}
            </div>
          </div>
          <div className="nav-right">
            <button className="nav-icon-btn" onClick={() => setSearchOpen(true)}>🔍</button>
            {user ? (
              <div className="nav-avatar-wrap">
                <img className="nav-avatar"
                  src={profile?.avatar_url || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.email}`}
                  alt="" onClick={() => setShowUserMenu(!showUserMenu)}
                  onError={e => e.target.src = "https://api.dicebear.com/7.x/initials/svg?seed=user"} />
                {showUserMenu && (
                  <div className="u-menu">
                    <div style={{ padding: ".85rem 1rem", borderBottom: "1px solid var(--s2)", background: "var(--s1)" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: ".6rem" }}>
                        <img src={profile?.avatar_url || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.email}`} alt=""
                          style={{ width: "34px", height: "34px", borderRadius: "50%", objectFit: "cover", border: "2px solid var(--red)", flexShrink: 0 }} />
                        <div style={{ minWidth: 0 }}>
                          <div style={{ fontSize: ".8rem", fontWeight: 700, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: "140px" }}>{profile?.username || "مستخدم"}</div>
                          <div style={{ fontSize: ".65rem", color: "var(--t3)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: "140px" }}>{user.email}</div>
                        </div>
                      </div>
                    </div>
                    <div className="u-menu-item" onClick={() => { setPage("home"); window.scrollTo(0, 0); setShowUserMenu(false); }}>🏠 الصفحة الرئيسية</div>
                    <div className="u-menu-item" onClick={() => { setPage("profile"); setShowUserMenu(false); }}>👤 الملف الشخصي</div>
                    {isAdmin && <div className="u-menu-item" onClick={() => { setPage("admin"); setShowUserMenu(false); }}>⚙ لوحة الإدارة</div>}
                    <div className="u-menu-div" />
                    <div className="u-menu-item" style={{ color: "var(--red3)" }} onClick={handleLogout}>🚪 تسجيل الخروج</div>
                  </div>
                )}
              </div>
            ) : (
              <div style={{ display: "flex", gap: ".5rem" }}>
                <button className="btn-signin" onClick={() => { setAuthMode("login"); setPage("auth"); }}>دخول</button>
                <button className="btn-join" onClick={() => { setAuthMode("register"); setPage("auth"); }}>انضم مجاناً</button>
              </div>
            )}
          </div>
        </nav>
      )}

      {searchOpen && <SearchPage movies={movies} series={series} onItemClick={handleItemClick} onClose={() => setSearchOpen(false)} />}
      {showUserMenu && <div style={{ position: "fixed", inset: 0, zIndex: 100 }} onClick={() => setShowUserMenu(false)} />}

      {page === "home" && <HomePage movies={movies} series={series} onItemClick={handleItemClick} onPlay={handlePlay} user={user} favorites={favorites} history={history} />}
      {page === "movies" && <MoviesPage movies={movies} onItemClick={handleItemClick} />}
      {page === "series" && <SeriesPage series={series} onItemClick={handleItemClick} />}
      {page === "detail" && selectedItem && <DetailPage item={selectedItem} onPlay={handlePlay} onBack={() => setPage("home")} user={user} favorites={favorites} onToggleFav={handleToggleFav} onSelectEp={handleSelectEp} />}
      {page === "player" && playerItem && <PlayerPage item={playerItem} episode={playerEp} onBack={goBack} />}
      {page === "auth" && <AuthPage mode={authMode} onAuth={handleAuth} onSwitch={() => setAuthMode(authMode === "login" ? "register" : "login")} />}
      {page === "profile" && user && <ProfilePage user={user} profile={profile} favorites={favorites} history={history} movies={movies} series={series} onItemClick={handleItemClick} onLogout={handleLogout} />}
      {page === "admin" && isAdmin && <AdminPage movies={movies} series={series} goHome={() => { setPage("home"); window.scrollTo(0, 0); }} refetch={refetch} />}

      {showFooter && (
        <footer className="footer">
          <div className="footer-top">
            <div>
              <div className="footer-logo"><span style={{ color: "#fff" }}>FLIX</span><span style={{ color: "#e50914" }}>TN</span></div>
              <div className="footer-desc">بوابتك إلى السينما العربية والتونسية والعالمية. استمتع بأفضل المحتوى في أي وقت وأي مكان.</div>
            </div>
            <div>
              <div className="footer-col-title">تصفح</div>
              {["الرئيسية", "الأفلام", "المسلسلات"].map(l => <span key={l} className="footer-link" onClick={() => { setPage(l === "الرئيسية" ? "home" : l === "الأفلام" ? "movies" : "series"); window.scrollTo(0, 0); }}>{l}</span>)}
            </div>
            <div>
              <div className="footer-col-title">التصنيفات</div>
              {["عربي", "تونسي", "عالمي", "أكشن", "دراما"].map(l => <span key={l} className="footer-link">{l}</span>)}
            </div>
            <div>
              <div className="footer-col-title">الحساب</div>
              {user
                ? [["👤 الملف الشخصي", "profile"], ["🚪 تسجيل الخروج", "logout"]].map(([l, k]) => <span key={k} className="footer-link" onClick={() => k === "logout" ? handleLogout() : setPage(k)}>{l}</span>)
                : [["تسجيل الدخول", "login"], ["إنشاء حساب", "register"]].map(([l, k]) => <span key={k} className="footer-link" onClick={() => { setAuthMode(k); setPage("auth"); }}>{l}</span>)}
            </div>
          </div>
          <div className="footer-bottom">
            <div className="footer-copy">© 2025 FlixTN. جميع الحقوق محفوظة.</div>
            <div className="footer-links"><span>الخصوصية</span><span>الشروط</span><span>المساعدة</span></div>
          </div>
        </footer>
      )}

      {toast && <Toast msg={toast} onClose={() => setToast("")} />}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
